name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_ENABLED_LOCALES: it,en,ur
          NEXT_PUBLIC_BASE_PATH: /javedgroup
          NEXT_PUBLIC_ROUTING_MODE: path

      - name: Debug — verify basePath in built output
        run: |
          echo "=== NEXT_PUBLIC_BASE_PATH value used ==="
          echo "$NEXT_PUBLIC_BASE_PATH"
          echo ""
          echo "=== CSS/JS asset paths in out/it/index.html ==="
          grep -o '"[^"]*_next[^"]*\.css"' out/it/index.html | head -3 || echo "(none found)"
          echo ""
          echo "=== Logo src paths in out/it/index.html ==="
          grep -o 'src="[^"]*logos[^"]*"' out/it/index.html | head -10 || echo "(none in HTML — loaded by JS)"
          echo ""
          echo "=== Search JS chunks for /logos paths ==="
          grep -rl '"/logos/' out/_next/static/chunks/ | head -5 || echo "(not found in chunks)"
          echo ""
          echo "=== Search JS chunks for basePath string ==="
          grep -rl 'javedgroup' out/_next/static/chunks/ | head -5 || echo "(javedgroup not found in chunks — basePath NOT baked in!)"
          echo ""
          echo "=== Sample: first <img or next/image src in out/it/index.html ==="
          grep -o 'src="[^"]*"' out/it/index.html | head -10 || echo "(no src attributes)"
        env:
          NEXT_PUBLIC_BASE_PATH: /javedgroup

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
